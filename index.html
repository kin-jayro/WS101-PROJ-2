<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Sidebar</title>
    <link rel="stylesheet" href="styles/index.css">
</head>

<body>

    <!-- Sidebar Toggle -->
    <button id="menuBtn" class="menu-btn">&#9776;</button>

    <!-- Overlay -->
    <div id="overlay" class="overlay"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">

        <button id="closeBtn" class="close-btn">&times;</button>

        <h2>Logo</h2>

        <ul class="sidebar-menu">
            <li>
                <a href="#" class="active">
                    <span>📢</span> Announcements & News Feed
                </a>
            </li>

            <li><a href="#"><span>📝</span> Feedback & Surveys</a></li>
            <li><a href="#"><span>👥</span> Directory of Officials</a></li>
            <li><a href="#"><span>💰</span> Budget & Asset Inventory</a></li>
            <li><a href="#"><span>📂</span> Documents</a></li>
            <li><a href="blotter.html"><span>📖</span> Blotter</a></li>
        </ul>

    </aside>

    <!-- Main Area -->
    <div class="main">


            <header class="header">

                <h1>Dashboard</h1>

                <!-- Logged In -->
                <div id="loggedInUser" class="header-right">
                    <span>Welcome, User</span>
                    <img src="" alt="Profile">

                    <button id="logoutBtn" class="logout-btn">
                        Logout
                    </button>
                </div>

                <!-- Guest (Hidden by default) -->
                <div id="guestUser" class="header-right" style="display:none;">
                    <button class="login-btn">Login</button>
                    <button class="register-btn">Register</button>
                </div>

            </header>
        <!-- Content -->
        <main class="content">
            <h2>Responsive Sidebar</h2>

            <p>
                Resize the browser window to see the sidebar behavior.
            </p>
        </main>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="js/supabase.js"></script>
    <script src="js/index.js"></script>

</body>

</html>
