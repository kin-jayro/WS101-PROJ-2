<!DOCTYPE html>
<html lang="en">

<head>
    <title>Login Page</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        body {
            position: relative;
            min-height: 100vh;
        }

        .header {
            background: #1abc9c;
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
        }

        .header h1 {
            margin: 0;
        }

        .title {
            display: flex;
        }

        .header-buttons {
            border-radius: 15px;
            color: white;
            font-size: 20px;
            padding: 8px;
            border: 3px solid white;
            margin-left: auto;
            font-weight: bold;
            background-color: #1abc9c;
        }

        .header-buttons:hover {
            color: #1abc9c;
            transition: 0.3s;
            background-color: white;
        }

@media (min-width: 1200px) {
    
}

/* Laptops */
@media (max-width: 1199px) {

}

/* Mobile phones */
@media (max-width: 480px) {

}
    </style>
</head>

<body>
    <div class="w3-sidebar w3-bar-block w3-card w3-animate-left" style="width:200px;" id="mySidebar">
        <button class="w3-bar-item w3-button w3-large" onclick="w3_close()">Close &times;</button>
        <a href="#" class="w3-bar-item w3-button">Link 1</a>
        <a href="#" class="w3-bar-item w3-button">Link 2</a>
        <a href="#" class="w3-bar-item w3-button">Link 3</a>
    </div>
    <div class="header">
        <div class="title">
            <button class="w3-bar-item w3-button w3-large" onclick="w3_open()">&#9776;</button>
            <h1>Header</h1>
        </div>
        <button class="header-buttons" onclick="window.location.href='login.html'">
            Login
        </button>
    </div>


    <script src="index.js"></script>

</body>

</html>
